<head>

<meta charset="UTF-8">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>

<nav class="navbar">

<a class="logo" href="index.html">

<i class="bi bi-controller"></i>

<div>

<h2>RIVALS</h2>

<span>Mission Center</span>

</div>

</a>

<ul class="nav-links">

<li><a href="index.html">首頁</a></li>

<li><a href="missions.html">任務</a></li>

<li><a href="shop.html">商店</a></li>

<li><a href="player.html">玩家中心</a></li>

</ul>

</nav>

<header class="hero">

<div class="hero-left">

<span class="season-badge">

Admin Panel

</span>

<h1>

管理員中心

</h1>

<p>

修改玩家資料與發送獎勵

</p>

</div>

</header>

<main>

<section class="mission-section">

<div class="card">

<h2>

<label>選擇玩家</label>

<select id="playerSelect">

</select>

<br><br>
  
👤 玩家資料

</h2>

<label>玩家名稱</label>

<input id="adminUsername" type="text" readonly>

<label>Roblox</label>

<input id="adminRoblox" type="text">

<label>Discord</label>

<input id="adminDiscord" type="text">

</div>

</section>

<section class="mission-section">

<h2>

📋 任務審核

</h2>

<div class="card">

<label>

任務 ID

</label>

<select id="missionSelect">

<option value="">請選擇任務</option>

</select>

<br><br>

<button class="btn" id="approveMission">

✅ 核准任務

</button>

</div>

</section>

<section class="mission-section">

<div class="card">

<h2>

🪙 金幣與等級

</h2>

<label>Gold</label>

<input id="adminGold" type="number">

<label>R 幣</label>

<input id="adminRcoin" type="number">

<label>EXP</label>

<input id="adminExp" type="number">

<label>Battle Pass</label>

<input id="adminBP" type="number">

<label>玩家等級</label>

<input id="adminLevel" type="number">

</div>

</section>

<section class="mission-section">

<div class="card">

<h2>

🎒 背包

</h2>

<label>Skin Case</label>

<input id="adminSkinCase" type="number">

<label>Palm Scythe</label>

<input id="adminScythe" type="number">

</div>

</section>

<section class="mission-section">

<div class="card" style="text-align:center;">

<button class="btn" id="saveAdmin">

💾 儲存所有資料

</button>

</div>

</section>

</main>

<script src="js/missions-data.js"></script>
<script src="js/script.js"></script>
<script src="js/admin.js"></script>

</body>

</html>
