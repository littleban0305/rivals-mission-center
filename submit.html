<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>提交任務 - Rivals Mission Center</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">

</head>

<body>

<!-- Navbar -->

<nav class="navbar">

    <a class="logo" href="index.html">

        <i class="bi bi-controller"></i>

        <div>

            <h2>RIVALS</h2>
            <span>Mission Center</span>

        </div>

    </a>

    <ul class="nav-links">

        <li><a href="index.html">首頁</a></li>
        <li><a href="missions.html">任務</a></li>
        <li><a href="shop.html">商店</a></li>

    </ul>

    <div class="user-menu">

        <button class="btn" id="userBtn">

            <i class="bi bi-person-circle"></i>

            <span id="username">elo哥</span>

            <i class="bi bi-chevron-down" id="dropdownArrow"></i>

        </button>

        <div class="dropdown-menu" id="dropdownMenu">

            <div class="dropdown-header">

                <i class="bi bi-person-circle"></i>

                <div>

                    <h4 id="dropdownUsername">elo哥</h4>

                    <span>Closed Beta</span>

                </div>

            </div>

            <hr>

            <a href="player.html">

                <i class="bi bi-person"></i>

                玩家中心

            </a>

            <button id="editProfileBtn">

                <i class="bi bi-pencil"></i>

                編輯資料

            </button>

            <hr>

            <button id="logoutBtn">

                <i class="bi bi-box-arrow-right"></i>

                登出

            </button>

        </div>

    </div>

</nav>

<!-- Hero -->

<header class="hero">

    <div class="hero-left">

        <span class="season-badge">

            提交任務

        </span>

        <h1>

            MISSION DETAILS

        </h1>

        <p>

            確認任務資訊後，
            點擊下方按鈕前往 Google Form 提交證明。

        </p>

    </div>

</header>

<main>

<section class="mission-section">

    <div class="card">

        <!-- 之後可加入任務圖片 -->
        <!--
        <img id="missionImage"
            src="images/default.png"
            alt="Mission">
        -->

        <h2 id="missionName">

            載入中...

        </h2>

        <hr>

<div class="submit-info">

    <div class="submit-item">

        <span>📅 任務類型</span>

        <strong id="missionType">--</strong>

    </div>

    <div class="submit-item">

        <span>🆔 任務代碼</span>

        <strong id="missionCode">--</strong>

    </div>

    <div class="submit-item">

        <span>🎁 任務獎勵</span>

        <strong id="missionReward">--</strong>

    </div>

    <div class="submit-item">

        <span>📷 需要證明</span>

        <strong id="missionProof">--</strong>

    </div>

</div>

        <hr>

        <p class="submit-note">

            完成任務後，
            點擊下方按鈕前往 Google Form 提交證明。

        </p>

        <br>

<div class="submit-buttons">

    <button class="btn" id="submitGoogle">

        <i class="bi bi-box-arrow-up-right"></i>

        前往 Google Form

    </button>

    <button
        class="outline-btn"
        onclick="history.back()">

        <i class="bi bi-arrow-left"></i>

        返回上一頁

    </button>

</div>

    </div>

</section>

</main>

<script src="js/missions-data.js"></script>
<script src="js/script.js"></script>
<script src="js/submit.js"></script>

</body>

</html>
