<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>登入 - Rivals Mission Center</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">

</head>

<body>

<nav class="navbar">

    <a class="logo" href="index.html">

        <i class="bi bi-controller"></i>

        <div>

            <h2>RIVALS</h2>

            <span>Mission Center</span>

        </div>

    </a>

</nav>

<main>

<section class="login-page">

<div class="login-card">

<h2>

<i class="bi bi-person-circle"></i>

登入

</h2>

<label>Roblox 使用者名稱：</label>

<input
    type="text"
    id="username"
    placeholder="請輸入使用者名稱">

<label>密碼：</label>

<input
    id="password"
    type="password"
    placeholder="請輸入密碼">

<button id="loginBtn" class="btn">

開始使用

</button>

<p class="login-tip">

登入後將建立你的玩家資料。

</p>

</div>

</section>

</main>

<script src="js/login.js"></script>

</body>

</html>
