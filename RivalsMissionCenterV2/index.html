<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rivals 任務中心 V2</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
<nav class="navbar">
<div class="logo"><i class="bi bi-controller"></i><span>RIVALS 任務中心</span></div>
<ul>
<li><a href="#">首頁</a></li>
<li><a href="#">任務</a></li>
<li><a href="#">Battle Pass</a></li>
<li><a href="#">商店</a></li>
<li><a href="#">排行榜</a></li>
</ul>
<button class="login-btn">登入</button>
</nav>

<header class="hero">
<div>
<span class="badge">SEASON 1</span>
<h1>RIVALS<br>MISSION CENTER</h1>
<p>完成每日與每週任務，累積 R 幣並提升 Battle Pass！</p>
<button>開始挑戰</button>
</div>
</header>

<main>
<section class="dashboard">
<div class="card"><h2>玩家資訊</h2><p>Guest</p></div>
<div class="card"><h2>Battle Pass</h2><div class="progress"><div class="bar"></div></div></div>
<div class="card"><h2>R 幣</h2><h1>0</h1></div>
</section>

<section class="section">
<h2>每日任務</h2>
<div class="task"><span>登入一次</span><button>領取</button></div>
<div class="task"><span>完成 3 場對戰</span><button disabled>未完成</button></div>
</section>

<section class="section">
<h2>每週任務</h2>
<div class="task"><span>贏得 10 場比賽</span><button disabled>未完成</button></div>
</section>

<section class="section">
<h2>最新公告</h2>
<div class="card">歡迎來到 Rivals 任務中心 V2！</div>
</section>
</main>

<script src="js/script.js"></script>
</body>
</html>
